version: "3.9"

services:

  mysql:
    image: mysql:8.0

    container_name: mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: employee_db

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d

  flask:

    build: .

    container_name: flask-app

    ports:
      - "5001:5000"

    depends_on:
      - mysql

    env_file:
      - .env

volumes:

  mysql-data: