<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Employee Management</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h1>Employee Management System</h1>

<form action="/add" method="POST">

<input
type="text"
name="name"
placeholder="Employee Name"
required>

<input
type="text"
name="role"
placeholder="Role"
required>

<input
type="text"
name="department"
placeholder="Department"
required>

<button type="submit">

Add Employee

</button>

</form>

<h2>Employee List</h2>

<table border="1">

<tr>

<th>ID</th>

<th>Name</th>

<th>Role</th>

<th>Department</th>

</tr>

{% for emp in employees %}

<tr>

<td>{{ emp[0] }}</td>

<td>{{ emp[1] }}</td>

<td>{{ emp[2] }}</td>

<td>{{ emp[3] }}</td>

</tr>

{% endfor %}

</table>

</body>

</html>
